# Redis local para desenvolvimento/teste do módulo de vídeo.
# Subir:   docker compose -f docker-compose.redis.yml up -d
# Parar:   docker compose -f docker-compose.redis.yml down
# Depois defina no backend/.env:  REDIS_URL=redis://localhost:6379/0
services:
  redis:
    image: redis:7-alpine
    container_name: autoracer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - autoracer_redis_data:/data

volumes:
  autoracer_redis_data:
